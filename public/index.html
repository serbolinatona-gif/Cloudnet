<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLOUDNET</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --sky: #3B8EE8;
      --sky2: #5BA3F0;
      --night: #08080F;
      --night2: #0F0F1E;
      --cream: #F5F2EC;
      --cloud: #FFFFFF;
      --ink: #08080F;
      --green: #1E7B4B;
      --orange: #FF5C1A;
      --pink: #F2A7C3;
      --lime: #C8E64A;
      --blue-pill: #3B8EE8;
      --rain: rgba(180,210,255,0.75);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--sky);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Sky gradient */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #5EC0F8 0%, #3B8EE8 45%, #2B72CC 100%);
      z-index: 0;
      pointer-events: none;
    }

    /* ===== LANG ===== */
    .lang-wrap {
      position: fixed; top: 20px; right: 20px;
      z-index: 300;
      display: flex;
      background: rgba(255,255,255,0.18);
      border: 1.5px solid rgba(255,255,255,0.4);
      border-radius: 100px;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }
    .lb {
      padding: 5px 13px;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.06em;
      border: none; background: transparent;
      color: rgba(255,255,255,0.65);
      cursor: pointer; transition: all 0.2s;
    }
    .lb.on { background: white; color: var(--sky); border-radius: 100px; }

    /* ===== NAV ===== */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
    }

    .logo {
      font-family: 'Unbounded', sans-serif;
      font-size: 1rem; font-weight: 900;
      color: white; letter-spacing: 0.18em;
      text-transform: uppercase; cursor: pointer;
      text-shadow: 0 2px 16px rgba(0,0,0,0.12);
      position: relative; z-index: 1;
      user-select: none;
    }

    .nav-r {
      display: flex; align-items: center; gap: 10px;
      position: relative; z-index: 1;
      margin-right: 110px;
    }

    .pill {
      padding: 9px 22px;
      border-radius: 100px;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; border: none; transition: all 0.2s;
    }
    .pill-ghost {
      background: rgba(255,255,255,0.18);
      border: 1.5px solid rgba(255,255,255,0.45);
      color: white;
      backdrop-filter: blur(8px);
    }
    .pill-ghost:hover { background: rgba(255,255,255,0.3); transform: translateY(-1px); }
    .pill-dark { background: var(--night); color: white; }
    .pill-dark:hover { background: #1a1a2e; transform: translateY(-1px); }
    .nav-username {
      font-family: 'Unbounded', sans-serif;
      font-size: 0.6rem; font-weight: 700;
      color: white; letter-spacing: 0.08em;
      text-transform: uppercase; cursor: pointer;
      text-shadow: 0 1px 8px rgba(0,0,0,0.2);
    }
    .nav-username:hover { text-decoration: underline; }

    /* ===== PAGES ===== */
    .page { display: none; position: relative; z-index: 1; }
    .page.on { display: block; }

    /* ===== FEED ===== */
    #pg-feed { padding: 96px 20px 140px; min-height: 100vh; }

    .feed-grid {
      max-width: 820px; margin: 0 auto;
      display: flex; flex-direction: column;
      gap: 0;
    }

    /* ===== CLOUD POST ===== */
    .cpost {
      position: relative;
      margin-bottom: 44px;
      max-width: 400px;
      animation: floatUp 0.65s cubic-bezier(0.34,1.45,0.64,1) both;
    }
    @keyframes floatUp {
      from { opacity:0; transform: translateY(36px) scale(0.9); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }
    .cpost:nth-child(2n)   { margin-left: 6%; }
    .cpost:nth-child(3n)   { margin-left: 22%; }
    .cpost:nth-child(4n)   { margin-left: 10%; }
    .cpost:nth-child(5n)   { margin-left: 30%; }
    .cpost:nth-child(6n)   { margin-left: 4%; }

    /* Cloud SVG shape */
    .cloud-wrap {
      position: relative;
      filter: drop-shadow(0 8px 24px rgba(8,8,30,0.14));
    }

    .cloud-svg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    .cloud-content {
      position: relative; z-index: 2;
      padding: 28px 32px 20px 32px;
      min-height: 110px;
    }

    .c-author {
      font-family: 'Unbounded', sans-serif;
      font-size: 0.55rem; font-weight: 700;
      color: var(--sky);
      text-transform: uppercase; letter-spacing: 0.14em;
      margin-bottom: 10px; cursor: pointer;
    }
    .c-author:hover { color: var(--sky2); text-decoration: underline; }

    .c-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem; font-weight: 400;
      color: #0D0D20; line-height: 1.55;
    }

    /* Rain drops decoration on cloud */
    .c-drops {
      display: flex; gap: 8px;
      margin-top: 10px; padding-left: 4px;
    }
    .c-drop {
      width: 5px; height: 9px;
      background: rgba(100,160,240,0.35);
      border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
    }

    /* ===== REACTIONS ===== */
    .c-rxns {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 0 0; margin-top: 6px;
      border-top: 1.5px solid rgba(8,8,30,0.06);
    }
    .rxbtn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: none; cursor: pointer;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.55rem; font-weight: 700;
      letter-spacing: 0.04em;
      color: rgba(8,8,30,0.4);
      padding: 5px 10px; border-radius: 100px;
      transition: all 0.18s;
    }
    .rxbtn:hover { background: rgba(8,8,30,0.05); color: rgba(8,8,30,0.8); }
    .rxbtn.liked { color: #E8354A; background: rgba(232,53,74,0.07); }
    .rxbtn.disliked { color: #3B8EE8; background: rgba(59,142,232,0.1); }
    .rxicon { font-size: 1rem; line-height:1; }

    .c-meta { margin-left: auto; display: flex; align-items: center; gap: 5px; }
    .c-time {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem; color: rgba(8,8,30,0.3);
    }
    .delbtn {
      background: none; border: none; cursor: pointer;
      color: rgba(8,8,30,0.2); font-size: 0.85rem;
      transition: color 0.15s; padding: 2px 5px;
    }
    .delbtn:hover { color: #E8354A; }

    /* ===== PHOTO CLOUD ===== */
    .post-pair { display: flex; align-items: flex-end; gap: 6px; }
    .post-pair .cloud-wrap { flex: 1; }

    .photo-cl {
      width: 88px; flex-shrink: 0;
      position: relative;
      filter: drop-shadow(0 4px 14px rgba(8,8,30,0.12));
    }
    .photo-cl-inner {
      background: white;
      border-radius: 30px 30px 22px 22px;
      padding: 7px; position: relative;
    }
    .photo-cl-inner::before, .photo-cl-inner::after {
      content: ''; position: absolute;
      background: white; border-radius: 50%;
    }
    .photo-cl-inner::before { width: 38px; height: 38px; top: -15px; left: 10px; }
    .photo-cl-inner::after  { width: 27px; height: 27px; top: -10px; left: 36px; }
    .photo-img { width: 100%; height: 66px; object-fit: cover; border-radius: 22px 22px 16px 16px; display: block; }
    .photo-badge {
      position: absolute; top: -5px; right: -5px;
      width: 30px; height: 30px;
      background: #C8E64A; border-radius: 50%;
      border: 2.5px solid var(--night);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.38rem; font-weight: 900;
      color: var(--night); z-index: 3;
      text-transform: uppercase; letter-spacing: 0.02em;
    }

    /* ===== FAB ===== */
    .fab {
      position: fixed; bottom: 30px; right: 30px; z-index: 50;
      background: var(--night); color: white; border: none;
      border-radius: 100px; padding: 16px 30px;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(8,8,30,0.25);
      transition: all 0.22s;
    }
    .fab:hover { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(8,8,30,0.32); }

    /* ===== MODAL ===== */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(5,5,18,0.6);
      backdrop-filter: blur(8px);
      z-index: 500; display: none;
      align-items: center; justify-content: center;
    }
    .overlay.on { display: flex; }

    .modal {
      background: white; border-radius: 28px;
      padding: 40px; max-width: 460px; width: 92%;
      position: relative;
      box-shadow: 0 28px 70px rgba(8,8,30,0.2);
      animation: popIn 0.3s cubic-bezier(0.34,1.45,0.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0.8) translateY(16px); opacity:0; }
      to   { transform: scale(1) translateY(0); opacity:1; }
    }

    .modal-x {
      position: absolute; top:16px; right:20px;
      background:none; border:none; font-size:1.3rem;
      color:rgba(0,0,0,0.25); cursor:pointer; line-height:1;
      transition: color 0.15s;
    }
    .modal-x:hover { color: var(--ink); }

    .modal-title {
      font-family: 'Unbounded', sans-serif;
      font-size: 1.05rem; font-weight: 900;
      color: var(--ink); text-transform: uppercase;
      letter-spacing: 0.1em; margin-bottom: 24px;
    }

    .tabs {
      display: flex; border-radius: 14px;
      overflow: hidden; border: 2px solid #EBEBF0;
      margin-bottom: 22px;
    }
    .tab {
      flex: 1; padding: 10px; border: none;
      background: transparent; cursor: pointer;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.58rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: rgba(0,0,0,0.3); transition: all 0.2s;
    }
    .tab.on { background: var(--night); color: white; border-radius: 12px; }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.55rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: rgba(0,0,0,0.38); margin-bottom: 7px;
    }
    .fin, .fta {
      width: 100%; border: 2px solid #EBEBF0;
      border-radius: 14px; padding: 13px 17px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; color: var(--ink);
      background: #F8F8FB; outline: none;
      transition: border-color 0.18s, background 0.18s;
    }
    .fin:focus, .fta:focus { border-color: var(--sky); background: white; }
    .fta { resize: vertical; min-height: 95px; }

    .wc {
      text-align: right;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.55rem; color: rgba(0,0,0,0.3);
      margin-top: 4px; letter-spacing: 0.04em;
    }
    .wc.over { color: #E8354A; font-weight: 700; }

    .file-lbl {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      border: 2px dashed rgba(59,142,232,0.35);
      background: rgba(59,142,232,0.05);
      border-radius: 14px; padding: 12px;
      cursor: pointer;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.55rem; font-weight: 700;
      color: var(--sky); text-transform: uppercase;
      letter-spacing: 0.08em; transition: all 0.18s; width: 100%;
    }
    .file-lbl:hover { background: rgba(59,142,232,0.1); }
    input[type=file] { display: none; }

    .iprev { margin-top: 10px; border-radius: 14px; max-height: 110px; max-width: 100%; display: none; object-fit: cover; }

    .sbtn {
      width: 100%; background: var(--night); color: white; border: none;
      border-radius: 100px; padding: 15px;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.65rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      cursor: pointer; transition: all 0.2s; margin-top: 10px;
    }
    .sbtn:hover { background: #1a1a2e; transform: translateY(-1px); }
    .sbtn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .errmsg {
      color: #E8354A;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.6rem; font-weight: 700;
      margin-top: 8px; display: none; letter-spacing: 0.04em;
    }
    .errmsg.on { display: block; }

    /* ===== PROFILE ===== */
    #pg-profile { min-height: 100vh; background: var(--night); }

    .prof-hero {
      background: linear-gradient(180deg, #08080F 0%, #0F0F1E 100%);
      padding: 100px 24px 56px;
      text-align: center; position: relative; overflow: hidden;
    }
    /* subtle stars */
    .prof-hero::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.55) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.3) 1px, transparent 1px);
      background-size: 120px 120px, 80px 80px;
      background-position: 0 0, 40px 40px;
      opacity: 0.18;
      pointer-events: none;
    }

    .moon-av {
      width: 108px; height: 108px; border-radius: 50%;
      margin: 0 auto 20px; overflow: hidden;
      background: #F0EFEA; cursor: pointer;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.06), 0 0 60px rgba(240,239,234,0.12), 0 8px 36px rgba(0,0,0,0.5);
      transition: box-shadow 0.3s;
      position: relative; z-index: 1;
    }
    .moon-av:hover { box-shadow: 0 0 0 4px rgba(255,255,255,0.13), 0 0 80px rgba(240,239,234,0.22), 0 8px 36px rgba(0,0,0,0.5); }
    .moon-av img { width:100%; height:100%; object-fit:cover; }
    .moon-ph { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:2.2rem; color:rgba(8,8,30,0.15); }

    .prof-name {
      font-family: 'Unbounded', sans-serif;
      font-size: 1.6rem; font-weight: 900;
      color: white; text-transform: uppercase;
      letter-spacing: 0.12em; position: relative; z-index: 1;
    }
    .prof-bio {
      color: rgba(255,255,255,0.38);
      font-size: 0.9rem; margin-top: 10px; line-height: 1.6;
      max-width: 360px; margin-left: auto; margin-right: auto;
      position: relative; z-index: 1;
    }
    .prof-edit-btn {
      margin-top: 18px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.13);
      color: rgba(255,255,255,0.6);
      border-radius: 100px; padding: 9px 22px;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.58rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      cursor: pointer; transition: all 0.2s;
      position: relative; z-index: 1;
    }
    .prof-edit-btn:hover { background: rgba(255,255,255,0.14); color: white; }

    .prof-posts { background: #0F0F1E; padding: 40px 24px 80px; }
    .prof-posts-inner { max-width: 500px; margin: 0 auto; }

    .sec-lbl {
      font-family: 'Unbounded', sans-serif;
      font-size: 0.55rem; font-weight: 700;
      color: rgba(255,255,255,0.18);
      text-transform: uppercase; letter-spacing: 0.16em;
      margin-bottom: 22px;
    }

    .prof-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px; padding: 20px 24px; margin-bottom: 14px;
    }
    .prof-card-text { color: rgba(255,255,255,0.78); font-size: 0.92rem; line-height: 1.55; }
    .prof-card-meta {
      color: rgba(255,255,255,0.2);
      font-family: 'Unbounded', sans-serif;
      font-size: 0.55rem; margin-top: 10px; letter-spacing: 0.04em;
    }

    /* ===== STATES ===== */
    .statemsg {
      text-align: center; padding: 90px 20px;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.7rem; color: rgba(255,255,255,0.5);
      text-transform: uppercase; letter-spacing: 0.1em;
      position: relative; z-index: 1;
    }

    /* ===== RAINBOW CANVAS ===== */
    #rbcanvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 999;
      display: none;
    }

    /* ===== RAIN ===== */
    #rainstage {
      position: fixed; pointer-events: none;
      z-index: 998; display: none; overflow: hidden;
    }
    .raindrop {
      position: absolute; width: 2px;
      background: linear-gradient(to bottom, transparent, rgba(160,200,255,0.9));
      border-radius: 2px;
      animation: rainfall linear forwards;
    }
    @keyframes rainfall {
      0%   { transform: translateY(-10px); opacity: 0.9; }
      100% { transform: translateY(160px); opacity: 0; }
    }

    /* Sparkle on rainbow */
    .sparkle {
      position: fixed; pointer-events: none;
      z-index: 1000; font-size: 1.4rem;
      animation: sparkleAnim 0.6s ease-out forwards;
    }
    @keyframes sparkleAnim {
      0%   { transform: scale(0) rotate(0deg); opacity: 1; }
      60%  { transform: scale(1.4) rotate(180deg); opacity: 1; }
      100% { transform: scale(0.8) rotate(360deg); opacity: 0; }
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
  </style>
</head>
<body>

<div class="lang-wrap">
  <button class="lb on" onclick="setLang('ru')">RU</button>
  <button class="lb"    onclick="setLang('en')">EN</button>
</div>

<nav>
  <div class="logo" onclick="loadFeed()">CLOUDNET</div>
  <div class="nav-r" id="nav-r">
    <button class="pill pill-ghost" onclick="openAuth()" data-i="login_btn">Войти</button>
  </div>
</nav>

<div id="pg-feed" class="page on">
  <div class="feed-grid" id="feed-grid">
    <div class="statemsg" data-i="loading">Загружаем облака...</div>
  </div>
</div>

<div id="pg-profile" class="page">
  <div id="prof-content"></div>
</div>

<button class="fab" onclick="openPost()">
  <span data-i="add_post">+ Добавить пост</span>
</button>

<!-- AUTH MODAL -->
<div class="overlay" id="m-auth">
  <div class="modal">
    <button class="modal-x" onclick="closeM('m-auth')">×</button>
    <div class="tabs">
      <button class="tab on" onclick="swTab('login')" data-i="tab_in">Войти</button>
      <button class="tab"   onclick="swTab('reg')"   data-i="tab_reg">Регистрация</button>
    </div>
    <div id="f-in">
      <div class="field"><label data-i="f_user">Имя пользователя</label><input class="fin" id="l-u" placeholder="username" autocomplete="username"></div>
      <div class="field"><label data-i="f_pass">Пароль</label><input type="password" class="fin" id="l-p" placeholder="••••••" autocomplete="current-password"></div>
      <div class="errmsg" id="l-e"></div>
      <button class="sbtn" onclick="doLogin()" data-i="btn_in">Войти</button>
    </div>
    <div id="f-reg" style="display:none">
      <div class="field"><label data-i="f_user">Имя пользователя</label><input class="fin" id="r-u" placeholder="username" autocomplete="username"></div>
      <div class="field"><label data-i="f_pass">Пароль</label><input type="password" class="fin" id="r-p" placeholder="минимум 6 символов" autocomplete="new-password"></div>
      <div class="errmsg" id="r-e"></div>
      <button class="sbtn" onclick="doReg()" data-i="btn_reg">Создать аккаунт</button>
    </div>
  </div>
</div>

<!-- POST MODAL -->
<div class="overlay" id="m-post">
  <div class="modal">
    <button class="modal-x" onclick="closeM('m-post')">×</button>
    <div class="modal-title" data-i="new_post">☁ Новый пост</div>
    <div class="field">
      <label data-i="lbl_text">Текст — максимум 50 слов</label>
      <textarea class="fta" id="p-txt" oninput="updWC()"></textarea>
      <div class="wc" id="wc">0 / 50</div>
    </div>
    <div class="field">
      <label class="file-lbl" for="p-img">📷 <span data-i="attach">Прикрепить фото</span></label>
      <input type="file" id="p-img" accept="image/*" onchange="prevImg()">
      <img id="p-prev" class="iprev">
    </div>
    <div class="errmsg" id="p-e"></div>
    <button class="sbtn" id="p-btn" onclick="submitPost()" data-i="publish">Опубликовать</button>
  </div>
</div>

<!-- EDIT PROFILE MODAL -->
<div class="overlay" id="m-edit">
  <div class="modal">
    <button class="modal-x" onclick="closeM('m-edit')">×</button>
    <div class="modal-title" data-i="edit_title">Редактировать профиль</div>
    <div class="field">
      <label class="file-lbl" for="av-f">🌙 <span data-i="upload_av">Загрузить аватар</span></label>
      <input type="file" id="av-f" accept="image/*">
    </div>
    <div class="field">
      <label data-i="lbl_bio">О себе</label>
      <textarea class="fta" id="e-bio" style="min-height:72px"></textarea>
    </div>
    <div class="errmsg" id="e-e"></div>
    <button class="sbtn" onclick="saveProf()" data-i="save">Сохранить</button>
  </div>
</div>

<canvas id="rbcanvas"></canvas>
<div id="rainstage"></div>

<script>
// ====== I18N ======
const T = {
  ru: {
    login_btn:'Войти', tab_in:'Войти', tab_reg:'Регистрация',
    f_user:'Имя пользователя', f_pass:'Пароль',
    btn_in:'Войти', btn_reg:'Создать аккаунт',
    new_post:'☁ Новый пост', lbl_text:'Текст — максимум 50 слов',
    attach:'Прикрепить фото', publish:'Опубликовать',
    edit_title:'Редактировать профиль', upload_av:'Загрузить аватар',
    lbl_bio:'О себе', save:'Сохранить',
    loading:'Загружаем облака...', add_post:'+ Добавить пост',
    logout:'Выйти', edit_prof:'Редактировать профиль',
    empty:'☁ Облаков пока нет', empty2:'Будь первым!',
    no_posts:'Постов ещё нет', no_bio:'Нет информации',
    just_now:'только что', m_ago:' мин назад', h_ago:' ч назад',
    del_q:'Удалить этот пост?', posts_lbl:'ПУБЛИКАЦИИ',
    login_reg:'Войти / Регистрация',
    err_content:'Напишите что-нибудь',
    err_50:'Максимум 50 слов',
  },
  en: {
    login_btn:'Sign in', tab_in:'Sign in', tab_reg:'Register',
    f_user:'Username', f_pass:'Password',
    btn_in:'Sign in', btn_reg:'Create account',
    new_post:'☁ New post', lbl_text:'Text — max 50 words',
    attach:'Attach photo', publish:'Publish',
    edit_title:'Edit profile', upload_av:'Upload avatar',
    lbl_bio:'About me', save:'Save',
    loading:'Loading clouds...', add_post:'+ Add post',
    logout:'Sign out', edit_prof:'Edit profile',
    empty:'☁ No clouds yet', empty2:'Be the first!',
    no_posts:'No posts yet', no_bio:'No bio',
    just_now:'just now', m_ago:' min ago', h_ago:' hr ago',
    del_q:'Delete this post?', posts_lbl:'POSTS',
    login_reg:'Sign in / Register',
    err_content:'Write something',
    err_50:'Max 50 words',
  }
};
let lang = 'ru';
const t = k => T[lang][k] || k;

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lb').forEach((b,i)=>{
    b.className = 'lb' + ((i===0&&l==='ru')||(i===1&&l==='en') ? ' on' : '');
  });
  document.querySelectorAll('[data-i]').forEach(el => {
    const k = el.getAttribute('data-i');
    if (T[lang][k]) el.textContent = T[lang][k];
  });
  updateNav();
}

// ====== STATE ======
let me = null;

async function init() {
  const r = await fetch('/api/me');
  me = (await r.json()).user;
  updateNav();
  loadFeed();
}

function updateNav() {
  const nr = document.getElementById('nav-r');
  if (me) {
    nr.innerHTML = `<span class="nav-username" onclick="showProf('${me.username}')">${me.username}</span>
      <button class="pill pill-dark" onclick="doLogout()">${t('logout')}</button>`;
  } else {
    nr.innerHTML = `<button class="pill pill-ghost" onclick="openAuth()">${t('login_reg')}</button>`;
  }
}

// ====== FEED ======
async function loadFeed() {
  showPg('pg-feed');
  const g = document.getElementById('feed-grid');
  g.innerHTML = `<div class="statemsg">${t('loading')}</div>`;
  const posts = await fetch('/api/posts').then(r=>r.json());
  if (!posts.length) {
    g.innerHTML = `<div class="statemsg">${t('empty')}<br><small style="opacity:.5;font-size:.85em">${t('empty2')}</small></div>`;
    return;
  }
  g.innerHTML = '';
  posts.forEach((p,i) => {
    const el = mkPost(p);
    el.style.animationDelay = `${i*0.055}s`;
    g.appendChild(el);
  });
}

// ====== BUILD POST ======
function mkPost(p) {
  const wrap = document.createElement('div');
  wrap.className = 'cpost';
  wrap.id = `p${p.id}`;
  const canDel = me && (me.username==='siteowner' || me.id===p.user_id);
  const lk = p.my_reaction==='like'    ? ' liked'    : '';
  const dk = p.my_reaction==='dislike' ? ' disliked' : '';

  const cloudHTML = `
    <div class="cloud-wrap">
      ${cloudSVG()}
      <div class="cloud-content">
        <div class="c-author" onclick="showProf('${p.username}')">@${p.username}</div>
        <div class="c-text">${esc(p.content)}</div>
        <div class="c-drops"><div class="c-drop"></div><div class="c-drop"></div><div class="c-drop"></div></div>
        <div class="c-rxns">
          <button class="rxbtn${lk}" onclick="react(${p.id},'like',this)">
            <span class="rxicon">🌈</span><span class="rn">${p.likes}</span>
          </button>
          <button class="rxbtn${dk}" onclick="react(${p.id},'dislike',this)">
            <span class="rxicon">🌧</span><span class="rn">${p.dislikes}</span>
          </button>
          <div class="c-meta">
            <span class="c-time">${fmtT(p.created_at)}</span>
            ${canDel?`<button class="delbtn" onclick="delPost(${p.id})">✕</button>`:''}
          </div>
        </div>
      </div>
    </div>`;

  if (p.image_url) {
    wrap.innerHTML = `<div class="post-pair">${cloudHTML}
      <div class="photo-cl"><div class="photo-cl-inner">
        <img src="${p.image_url}" class="photo-img" alt="">
        <div class="photo-badge">Photo</div>
      </div></div></div>`;
  } else {
    wrap.innerHTML = cloudHTML;
  }
  return wrap;
}

function cloudSVG() {
  const id = 'cf' + Math.random().toString(36).slice(2,7);
  return `<svg class="cloud-svg" viewBox="0 0 400 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="${id}">
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="${Math.floor(Math.random()*99)}" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.8" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
    <g filter="url(#${id})">
      <ellipse cx="60"  cy="78" rx="58" ry="44" fill="white"/>
      <ellipse cx="130" cy="65" rx="62" ry="50" fill="white"/>
      <ellipse cx="205" cy="60" rx="68" ry="52" fill="white"/>
      <ellipse cx="280" cy="64" rx="62" ry="50" fill="white"/>
      <ellipse cx="348" cy="76" rx="58" ry="44" fill="white"/>
      <ellipse cx="95"  cy="42" rx="46" ry="38" fill="white"/>
      <ellipse cx="170" cy="34" rx="52" ry="40" fill="white"/>
      <ellipse cx="245" cy="32" rx="50" ry="38" fill="white"/>
      <ellipse cx="318" cy="40" rx="46" ry="36" fill="white"/>
    </g>
  </svg>`;
}

// ====== REACT ======
async function react(pid, type, btn) {
  if (!me) { openAuth(); return; }
  const el = document.getElementById(`p${pid}`);
  const btns = el.querySelectorAll('.rxbtn');
  const r = await fetch(`/api/posts/${pid}/react`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({type})
  });
  const d = await r.json();
  btns[0].querySelector('.rn').textContent = d.likes;
  btns[1].querySelector('.rn').textContent = d.dislikes;
  btns[0].className = 'rxbtn' + (d.my_reaction==='like'    ? ' liked'    : '');
  btns[1].className = 'rxbtn' + (d.my_reaction==='dislike' ? ' disliked' : '');
  if (type==='like'    && d.my_reaction==='like')    doRainbow(el);
  if (type==='dislike' && d.my_reaction==='dislike') doRain(el);
}

// ====== RAINBOW ======
function doRainbow(srcEl) {
  const rc = document.getElementById('rbcanvas');
  rc.style.display = 'block';
  rc.width = window.innerWidth; rc.height = window.innerHeight;
  const ctx = rc.getContext('2d');
  const rect = srcEl.getBoundingClientRect();
  const sx = rect.left + rect.width/2;
  const sy = rect.top  + rect.height/2;

  // Rainbow stripes like the sketch: red, orange, yellow, green, blue, lavender
  const STRIPES = [
    { color:'#FF3F5A', w:16 },
    { color:'#FF8C1A', w:14 },
    { color:'#FFD93D', w:12 },
    { color:'#4ADE80', w:12 },
    { color:'#60C8FF', w:11 },
    { color:'#C8B4F0', w:10 },
  ];
  const TOTAL_W = STRIPES.reduce((a,s)=>a+s.w,0);

  const dur = 1600;
  const t0 = performance.now();
  let sparkled = false;

  function frame(now) {
    const prog = Math.min((now-t0)/dur, 1);
    ctx.clearRect(0,0,rc.width,rc.height);

    const ease = prog<0.5 ? 2*prog*prog : -1+(4-2*prog)*prog;
    // Big arc from cloud to top-right
    const ex = rc.width * 0.9;
    const ey = rc.height * 0.04;
    const cpx = sx + (ex-sx)*0.3;
    const cpy = sy - rc.height * 0.6 * Math.sin(Math.PI*prog*0.8);

    const alpha = Math.sin(Math.PI*prog) * 0.95;
    let offset = -(TOTAL_W/2);

    STRIPES.forEach(stripe => {
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      const ex2 = sx + (ex-sx)*ease;
      const ey2 = sy + (ey-sy)*ease - rc.height*0.3*Math.sin(Math.PI*prog*0.85);
      ctx.quadraticCurveTo(cpx, cpy, ex2, ey2);
      ctx.strokeStyle = stripe.color;
      ctx.lineWidth   = stripe.w;
      ctx.lineCap     = 'round';
      ctx.globalAlpha = alpha;
      // Offset each stripe perpendicularly
      ctx.shadowColor = stripe.color;
      ctx.shadowBlur  = 6;
      ctx.stroke();
      ctx.shadowBlur = 0;
      offset += stripe.w;
    });
    ctx.globalAlpha = 1;

    // Sparkle at midpoint when prog ~ 0.5
    if (!sparkled && prog > 0.42 && prog < 0.58) {
      sparkled = true;
      const mx = sx + (ex-sx)*0.45;
      const my = sy + (ey-sy)*0.45 - rc.height*0.28;
      addSparkle(mx, my);
      addSparkle(mx + 60, my - 40);
    }

    if (prog < 1) requestAnimationFrame(frame);
    else { ctx.clearRect(0,0,rc.width,rc.height); rc.style.display='none'; }
  }
  requestAnimationFrame(frame);
}

function addSparkle(x, y) {
  const s = document.createElement('div');
  s.className = 'sparkle';
  s.textContent = '✦';
  s.style.left = x + 'px';
  s.style.top  = y + 'px';
  s.style.color = 'white';
  document.body.appendChild(s);
  setTimeout(()=>s.remove(), 700);
}

// ====== RAIN ======
function doRain(srcEl) {
  const stage = document.getElementById('rainstage');
  const rect  = srcEl.getBoundingClientRect();
  stage.style.cssText = `display:block;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height+200}px;`;
  stage.innerHTML = '';
  for (let i=0; i<70; i++) {
    const d = document.createElement('div');
    d.className = 'raindrop';
    const h = 10 + Math.random()*20;
    d.style.cssText = `left:${Math.random()*100}%;height:${h}px;
      animation-duration:${0.3+Math.random()*0.5}s;
      animation-delay:${Math.random()*1.1}s;
      opacity:${0.45+Math.random()*0.55};`;
    stage.appendChild(d);
  }
  setTimeout(()=>{ stage.style.display='none'; stage.innerHTML=''; }, 2800);
}

// ====== POST ======
function openPost() {
  if (!me) { openAuth(); return; }
  document.getElementById('p-txt').value = '';
  document.getElementById('p-img').value = '';
  document.getElementById('p-prev').style.display='none';
  document.getElementById('p-e').className='errmsg';
  document.getElementById('wc').textContent='0 / 50';
  openM('m-post');
}

function updWC() {
  const txt = document.getElementById('p-txt').value.trim();
  const w = txt ? txt.split(/\s+/).length : 0;
  const el = document.getElementById('wc');
  el.textContent = `${w} / 50`;
  el.className = w>50 ? 'wc over' : 'wc';
}

function prevImg() {
  const f = document.getElementById('p-img').files[0];
  const p = document.getElementById('p-prev');
  if (f) { const r=new FileReader(); r.onload=e=>{p.src=e.target.result;p.style.display='block';}; r.readAsDataURL(f); }
  else p.style.display='none';
}

async function submitPost() {
  const content = document.getElementById('p-txt').value.trim();
  const imgFile = document.getElementById('p-img').files[0];
  const errEl   = document.getElementById('p-e');
  const btn     = document.getElementById('p-btn');
  if (!content) { showE(errEl, t('err_content')); return; }
  if (content.split(/\s+/).length>50) { showE(errEl, t('err_50')); return; }
  btn.disabled=true; btn.textContent = lang==='ru'?'Публикуем...':'Publishing...';
  const fd = new FormData();
  fd.append('content', content);
  if (imgFile) fd.append('image', imgFile);
  try {
    const r = await fetch('/api/posts',{method:'POST',body:fd});
    const d = await r.json();
    if (!r.ok) { showE(errEl,d.error); btn.disabled=false; btn.textContent=t('publish'); return; }
    closeM('m-post');
    const g = document.getElementById('feed-grid');
    const old = g.querySelector('.statemsg');
    if (old) old.remove();
    const el = mkPost(d); el.style.animationDelay='0s';
    g.insertBefore(el, g.firstChild);
  } catch(e) { showE(errEl,'Error'); }
  btn.disabled=false; btn.textContent=t('publish');
}

async function delPost(id) {
  if (!confirm(t('del_q'))) return;
  const r = await fetch(`/api/posts/${id}`,{method:'DELETE'});
  if (r.ok) document.getElementById(`p${id}`)?.remove();
}

// ====== PROFILE ======
async function showProf(username) {
  showPg('pg-profile');
  const c = document.getElementById('prof-content');
  c.innerHTML = `<div class="prof-hero"><div class="statemsg" style="color:rgba(255,255,255,0.3)">${t('loading')}</div></div>`;
  const r = await fetch(`/api/profile/${username}`);
  const d = await r.json();
  if (!r.ok) return;
  const {user, posts} = d;
  const isMe = me && me.id===user.id;
  c.innerHTML = `
    <div class="prof-hero">
      <div class="moon-av">
        ${user.avatar_url ? `<img src="${user.avatar_url}" alt="">` : `<div class="moon-ph">☽</div>`}
      </div>
      <div class="prof-name">${esc(user.username)}</div>
      <div class="prof-bio">${user.about ? esc(user.about) : `<em>${t('no_bio')}</em>`}</div>
      ${isMe ? `<button class="prof-edit-btn" onclick="openEdit()">${t('edit_prof')}</button>` : ''}
    </div>
    <div class="prof-posts">
      <div class="prof-posts-inner">
        <div class="sec-lbl">${t('posts_lbl')}</div>
        ${posts.length===0
          ? `<div style="color:rgba(255,255,255,0.2);font-family:'Unbounded',sans-serif;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em">${t('no_posts')}</div>`
          : posts.map(p=>`
            <div class="prof-card">
              <div class="prof-card-text">${esc(p.content)}</div>
              ${p.image_url?`<img src="${p.image_url}" style="max-width:100%;border-radius:12px;margin-top:10px">` : ''}
              <div class="prof-card-meta">${fmtT(p.created_at)} · 🌈${p.likes} 🌧${p.dislikes}</div>
            </div>`).join('')}
      </div>
    </div>`;
}

function openEdit() {
  document.getElementById('e-bio').value = me.about||'';
  openM('m-edit');
}

async function saveProf() {
  const bio = document.getElementById('e-bio').value;
  const avf = document.getElementById('av-f').files[0];
  const errEl = document.getElementById('e-e');
  const fd = new FormData();
  fd.append('about', bio);
  if (avf) fd.append('avatar', avf);
  const r = await fetch('/api/profile',{method:'PUT',body:fd});
  const d = await r.json();
  if (!r.ok) { showE(errEl,d.error); return; }
  me = {...me,...d};
  closeM('m-edit');
  showProf(me.username);
}

// ====== AUTH ======
function openAuth() { openM('m-auth'); }

function swTab(tab) {
  document.getElementById('f-in').style.display  = tab==='login'?'block':'none';
  document.getElementById('f-reg').style.display = tab==='reg'?'block':'none';
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.className='tab'+((i===0&&tab==='login')||(i===1&&tab==='reg')?' on':'');
  });
}

async function doLogin() {
  const u = document.getElementById('l-u').value.trim();
  const p = document.getElementById('l-p').value;
  const e = document.getElementById('l-e');
  const r = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
  const d = await r.json();
  if (!r.ok) { showE(e,d.error); return; }
  me = (await (await fetch('/api/me')).json()).user;
  closeM('m-auth'); updateNav(); loadFeed();
}

async function doReg() {
  const u = document.getElementById('r-u').value.trim();
  const p = document.getElementById('r-p').value;
  const e = document.getElementById('r-e');
  if (!u||!p) { showE(e,'Заполните все поля'); return; }
  const r = await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
  const d = await r.json();
  if (!r.ok) { showE(e,d.error||'Ошибка регистрации'); return; }
  me = (await (await fetch('/api/me')).json()).user;
  closeM('m-auth'); updateNav(); loadFeed();
}

async function doLogout() {
  await fetch('/api/logout',{method:'POST'});
  me=null; updateNav(); loadFeed();
}

// ====== UTILS ======
function showPg(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  window.scrollTo(0,0);
}
function openM(id)  { document.getElementById(id).classList.add('on'); }
function closeM(id) { document.getElementById(id).classList.remove('on'); }
function showE(el,msg) { el.textContent=msg; el.className='errmsg on'; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtT(ds) {
  const d=new Date(ds), diff=(Date.now()-d)/1000;
  if (diff<60)    return t('just_now');
  if (diff<3600)  return Math.floor(diff/60)+t('m_ago');
  if (diff<86400) return Math.floor(diff/3600)+t('h_ago');
  return d.toLocaleDateString(lang==='ru'?'ru-RU':'en-US',{day:'numeric',month:'short'});
}

document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('on'); });
});
document.getElementById('l-p').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('r-p').addEventListener('keydown',e=>{ if(e.key==='Enter') doReg(); });

init();
</script>
</body>
</html>
