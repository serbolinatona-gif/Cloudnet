<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLOUDNET</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Geologica:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sky: #4BA3E3;
      --sky-light: #6BBEF5;
      --sky-deep: #2B7CC1;
      --night: #0A0A14;
      --night2: #111122;
      --moon-white: #F0EFEA;
      --cloud-white: #F5F4EF;
      --chalk-dark: #1A1A2E;
      --green-chalk: #7FE840;
      --ink: #0D0D1A;
      --sun: #FFD93D;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Geologica', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: default;
    }

    body {
      background: var(--sky);
      position: relative;
    }

    /* Animated sky gradient */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(255,255,255,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 90%, rgba(43,124,193,0.4) 0%, transparent 60%),
        linear-gradient(180deg, #7BC8F0 0%, #4BA3E3 40%, #2B7CC1 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== LANG SWITCH ===== */
    .lang-switch {
      position: fixed;
      top: 18px; right: 18px;
      z-index: 200;
      background: rgba(255,255,255,0.25);
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 50px;
      display: flex;
      overflow: hidden;
      backdrop-filter: blur(8px);
    }
    .lang-btn {
      padding: 6px 14px;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }
    .lang-btn.active {
      background: white;
      color: var(--sky-deep);
      border-radius: 50px;
    }

    /* ===== NAV ===== */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
    }

    .nav-logo {
      font-family: 'Unbounded', sans-serif;
      font-size: 1.1rem;
      font-weight: 900;
      color: white;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      text-shadow: 0 2px 12px rgba(0,0,0,0.15);
      position: relative;
      z-index: 1;
    }
    .nav-logo span { color: var(--moon-white); opacity: 0.7; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
      margin-right: 100px;
    }

    .nav-pill {
      background: rgba(255,255,255,0.22);
      border: 2px solid rgba(255,255,255,0.45);
      border-radius: 50px;
      padding: 8px 20px;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      color: white;
      letter-spacing: 0.08em;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
      text-transform: uppercase;
    }
    .nav-pill:hover {
      background: rgba(255,255,255,0.38);
      transform: translateY(-1px);
    }
    .nav-pill.dark {
      background: var(--night);
      border-color: var(--night);
      color: white;
    }
    .nav-pill.dark:hover { background: #1a1a30; }

    .nav-user {
      font-family: 'Unbounded', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      color: white;
      letter-spacing: 0.08em;
      cursor: pointer;
      text-transform: uppercase;
      text-shadow: 0 1px 6px rgba(0,0,0,0.2);
    }
    .nav-user:hover { text-decoration: underline; }

    /* ===== PAGES ===== */
    .page { display: none; }
    .page.active { display: block; }

    /* ===== FEED ===== */
    #feed-page {
      padding: 100px 24px 120px;
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }

    .feed-inner {
      max-width: 860px;
      margin: 0 auto;
    }

    /* ===== CHALK CLOUD POST ===== */
    .cloud-post {
      margin: 0 auto 48px;
      max-width: 440px;
      position: relative;
      animation: driftIn 0.7s cubic-bezier(0.34, 1.4, 0.64, 1) both;
    }

    @keyframes driftIn {
      from { opacity: 0; transform: translateY(40px) scale(0.88); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    .cloud-post:nth-child(2n)   { margin-left: 8%; margin-right: auto; }
    .cloud-post:nth-child(3n)   { margin-left: auto; margin-right: 4%; }
    .cloud-post:nth-child(4n)   { margin-left: 18%; }
    .cloud-post:nth-child(5n)   { margin-left: 2%; }

    /* SVG chalk cloud wrapper */
    .cloud-svg-wrap {
      position: relative;
      filter: drop-shadow(0 6px 18px rgba(10,20,50,0.13));
    }

    .cloud-svg-wrap svg.cloud-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .cloud-body {
      position: relative;
      z-index: 2;
      padding: 26px 30px 18px;
    }

    .cloud-author {
      font-family: 'Unbounded', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--sky-deep);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 9px;
      cursor: pointer;
    }
    .cloud-author:hover { text-decoration: underline; }

    .cloud-text {
      font-family: 'Geologica', sans-serif;
      font-size: 1rem;
      color: var(--ink);
      line-height: 1.55;
      font-weight: 400;
    }

    /* Chalk line decorations */
    .chalk-lines {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .chalk-line {
      height: 2.5px;
      background: var(--ink);
      border-radius: 4px;
      opacity: 0.08;
    }
    .chalk-line:nth-child(1) { width: 100%; }
    .chalk-line:nth-child(2) { width: 72%; }
    .chalk-line:nth-child(3) { width: 48%; }

    /* ===== PHOTO CLOUD ===== */
    .post-with-photo {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .post-with-photo .cloud-svg-wrap { flex: 1; }

    .photo-cloud {
      width: 96px;
      flex-shrink: 0;
      position: relative;
      filter: drop-shadow(0 4px 12px rgba(10,20,50,0.12));
    }
    .photo-cloud-inner {
      background: var(--cloud-white);
      border-radius: 36px 36px 28px 28px;
      padding: 8px;
      position: relative;
    }
    .photo-cloud-inner::before,
    .photo-cloud-inner::after {
      content: '';
      position: absolute;
      background: var(--cloud-white);
      border-radius: 50%;
    }
    .photo-cloud-inner::before { width: 42px; height: 42px; top: -18px; left: 12px; }
    .photo-cloud-inner::after  { width: 30px; height: 30px; top: -12px; left: 42px; }

    .photo-img {
      width: 100%;
      height: 72px;
      object-fit: cover;
      border-radius: 24px 24px 20px 20px;
      display: block;
    }
    .photo-badge {
      position: absolute;
      top: -6px; right: -6px;
      width: 34px; height: 34px;
      background: var(--green-chalk);
      border-radius: 50%;
      border: 2.5px solid var(--ink);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.42rem;
      font-weight: 900;
      color: var(--ink);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      z-index: 3;
    }

    /* ===== REACTIONS ===== */
    .cloud-reactions {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0 0;
      margin-top: 8px;
      border-top: 1.5px solid rgba(10,10,30,0.07);
    }

    .rxn-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: none; cursor: pointer;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--ink);
      opacity: 0.45;
      padding: 5px 10px;
      border-radius: 50px;
      transition: all 0.18s;
      letter-spacing: 0.04em;
    }
    .rxn-btn:hover { opacity: 0.9; background: rgba(0,0,0,0.05); }
    .rxn-btn.liked  { opacity: 1; color: #e8375a; }
    .rxn-btn.disliked { opacity: 1; color: #3a8fd4; }
    .rxn-icon { font-size: 1.05rem; line-height: 1; }

    .cloud-meta {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
    }
    .cloud-time {
      font-family: 'Geologica', sans-serif;
      font-size: 0.65rem;
      color: rgba(10,10,30,0.35);
    }
    .del-btn {
      background: none; border: none; cursor: pointer;
      color: rgba(10,10,30,0.25);
      font-size: 0.85rem;
      transition: color 0.15s;
      padding: 2px 4px;
    }
    .del-btn:hover { color: #e8375a; }

    /* ===== ADD POST BTN ===== */
    .fab {
      position: fixed;
      bottom: 32px; right: 32px;
      z-index: 50;
      background: var(--night);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 16px 30px;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(10,10,30,0.28);
      transition: all 0.22s;
    }
    .fab:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(10,10,30,0.35); }

    /* ===== MODAL ===== */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(5,5,15,0.55);
      backdrop-filter: blur(6px);
      z-index: 500;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 28px;
      padding: 38px;
      max-width: 470px;
      width: 92%;
      position: relative;
      box-shadow: 0 24px 64px rgba(10,10,30,0.22);
      animation: popUp 0.32s cubic-bezier(0.34, 1.4, 0.64, 1);
    }
    @keyframes popUp {
      from { transform: scale(0.82) translateY(20px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }

    .modal-x {
      position: absolute; top: 18px; right: 22px;
      background: none; border: none;
      font-size: 1.3rem; cursor: pointer;
      color: rgba(0,0,0,0.28); line-height: 1;
      transition: color 0.15s;
    }
    .modal-x:hover { color: var(--ink); }

    .modal-title {
      font-family: 'Unbounded', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      color: var(--ink);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 22px;
    }

    .tabs {
      display: flex;
      border-radius: 14px;
      overflow: hidden;
      border: 2px solid #EEEEF4;
      margin-bottom: 22px;
    }
    .tab {
      flex: 1; padding: 10px;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      border: none; background: transparent;
      color: rgba(0,0,0,0.35); cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active { background: var(--night); color: white; border-radius: 12px; }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.58rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: rgba(0,0,0,0.4);
      margin-bottom: 6px;
    }
    .finput, .ftextarea {
      width: 100%;
      border: 2px solid #EEEEF4;
      border-radius: 14px;
      padding: 12px 16px;
      font-family: 'Geologica', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      background: #F9F9FC;
      outline: none;
      transition: border-color 0.18s, background 0.18s;
    }
    .finput:focus, .ftextarea:focus {
      border-color: var(--sky);
      background: white;
    }
    .ftextarea { resize: vertical; min-height: 96px; }

    .wcount {
      text-align: right;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.58rem;
      color: rgba(0,0,0,0.3);
      margin-top: 4px;
      letter-spacing: 0.05em;
    }
    .wcount.over { color: #e8375a; font-weight: 700; }

    .file-label {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      border: 2px dashed rgba(75,163,227,0.4);
      background: rgba(75,163,227,0.06);
      border-radius: 14px;
      padding: 11px;
      cursor: pointer;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.58rem; font-weight: 700;
      color: var(--sky-deep);
      text-transform: uppercase; letter-spacing: 0.08em;
      transition: all 0.18s;
      width: 100%;
    }
    .file-label:hover { background: rgba(75,163,227,0.12); }
    input[type="file"] { display: none; }

    .img-prev {
      margin-top: 10px; border-radius: 14px;
      max-height: 110px; max-width: 100%;
      object-fit: cover; display: none;
    }

    .submit-btn {
      width: 100%;
      background: var(--night); color: white; border: none;
      border-radius: 50px; padding: 15px;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      cursor: pointer; transition: all 0.2s;
      margin-top: 10px;
    }
    .submit-btn:hover { background: #1a1a30; transform: translateY(-1px); }
    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .err {
      color: #e8375a;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.62rem; font-weight: 700;
      margin-top: 8px; display: none;
      letter-spacing: 0.04em;
    }
    .err.show { display: block; }

    /* ===== PROFILE PAGE ===== */
    #profile-page {
      background: var(--night);
      min-height: 100vh;
      padding: 0;
      position: relative;
    }

    .profile-sky {
      background: linear-gradient(180deg, #0A0A14 0%, #0d1020 100%);
      padding: 100px 24px 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Stars on profile */
    .profile-sky::before {
      content: '★ · ✦ · ★ · · ✦ · ★ · ✦ · · ★ · ✦ · ★';
      position: absolute;
      top: 24px; left: 0; right: 0;
      text-align: center;
      font-size: 0.5rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.5em;
      pointer-events: none;
    }

    .profile-moon-wrap {
      width: 110px; height: 110px;
      background: var(--moon-white);
      border-radius: 50%;
      margin: 0 auto 20px;
      overflow: hidden;
      cursor: pointer;
      box-shadow:
        0 0 0 3px rgba(255,255,255,0.08),
        0 0 60px rgba(240,239,234,0.15),
        0 8px 32px rgba(0,0,0,0.4);
      transition: box-shadow 0.3s;
    }
    .profile-moon-wrap:hover {
      box-shadow:
        0 0 0 4px rgba(255,255,255,0.15),
        0 0 80px rgba(240,239,234,0.25),
        0 8px 32px rgba(0,0,0,0.4);
    }
    .profile-moon-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .moon-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem; color: rgba(10,10,20,0.2);
    }

    .profile-name {
      font-family: 'Unbounded', sans-serif;
      font-size: 1.5rem; font-weight: 900;
      color: var(--moon-white);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .profile-about {
      color: rgba(240,239,234,0.45);
      font-size: 0.9rem;
      margin-top: 10px;
      line-height: 1.6;
      max-width: 380px;
      margin-left: auto; margin-right: auto;
    }
    .profile-edit-btn {
      margin-top: 18px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
      border-radius: 50px;
      padding: 9px 22px;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.58rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      cursor: pointer; transition: all 0.2s;
    }
    .profile-edit-btn:hover { background: rgba(255,255,255,0.13); color: white; }

    .profile-posts-section {
      background: var(--night2);
      padding: 40px 24px 60px;
    }
    .profile-posts-inner { max-width: 520px; margin: 0 auto; }

    .section-label {
      font-family: 'Unbounded', sans-serif;
      font-size: 0.6rem; font-weight: 700;
      color: rgba(255,255,255,0.22);
      text-transform: uppercase; letter-spacing: 0.15em;
      margin-bottom: 24px;
    }

    .profile-post-card {
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 22px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .profile-post-text {
      color: rgba(240,239,234,0.82);
      font-size: 0.92rem;
      line-height: 1.55;
    }
    .profile-post-meta {
      color: rgba(255,255,255,0.22);
      font-size: 0.62rem;
      margin-top: 10px;
      font-family: 'Unbounded', sans-serif;
      letter-spacing: 0.04em;
    }

    /* ===== EMPTY / LOADING ===== */
    .state-msg {
      text-align: center;
      padding: 80px 20px;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      position: relative;
      z-index: 1;
    }

    /* ===== RAINBOW CANVAS ===== */
    #rainbow-canvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 999;
      display: none;
    }

    /* ===== RAIN ===== */
    #rain-stage {
      position: fixed;
      pointer-events: none;
      z-index: 998;
      overflow: hidden;
      display: none;
    }

    .drop {
      position: absolute;
      width: 1.5px;
      border-radius: 2px;
      background: linear-gradient(to bottom, transparent, rgba(130,190,255,0.85));
      animation: drip linear forwards;
    }
    @keyframes drip {
      0%   { transform: translateY(-30px) scaleY(0.5); opacity: 0.9; }
      100% { transform: translateY(140px) scaleY(1.2); opacity: 0; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 3px; }
  </style>
</head>
<body>

<!-- Lang switch -->
<div class="lang-switch">
  <button class="lang-btn active" onclick="setLang('ru')">RU</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
</div>

<!-- Nav -->
<nav>
  <div class="nav-logo" onclick="loadFeed()">☁ <span>ОБЛАКА</span></div>
  <div class="nav-right" id="nav-right">
    <button class="nav-pill" onclick="openAuthModal()" data-i="login_btn">Войти</button>
  </div>
</nav>

<!-- Feed -->
<div id="feed-page" class="page active">
  <div class="feed-inner" id="posts-wrap">
    <div class="state-msg" data-i="loading">Загружаем облака...</div>
  </div>
</div>

<!-- Profile -->
<div id="profile-page" class="page">
  <div id="profile-content"></div>
</div>

<!-- FAB -->
<button class="fab" onclick="openPostModal()">
  <span data-i="add_post">+ Добавить пост</span>
</button>

<!-- Auth modal -->
<div class="overlay" id="m-auth">
  <div class="modal">
    <button class="modal-x" onclick="closeModal('m-auth')">×</button>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')" data-i="tab_login">Войти</button>
      <button class="tab" onclick="switchTab('register')" data-i="tab_reg">Регистрация</button>
    </div>
    <div id="f-login">
      <div class="field">
        <label data-i="username_label">Имя пользователя</label>
        <input type="text" class="finput" id="l-user" placeholder="username">
      </div>
      <div class="field">
        <label data-i="password_label">Пароль</label>
        <input type="password" class="finput" id="l-pass" placeholder="••••••">
      </div>
      <div class="err" id="l-err"></div>
      <button class="submit-btn" onclick="doLogin()" data-i="login_submit">Войти</button>
    </div>
    <div id="f-reg" style="display:none">
      <div class="field">
        <label data-i="username_label">Имя пользователя</label>
        <input type="text" class="finput" id="r-user" placeholder="username">
      </div>
      <div class="field">
        <label data-i="password_label">Пароль</label>
        <input type="password" class="finput" id="r-pass" placeholder="••••••">
      </div>
      <div class="err" id="r-err"></div>
      <button class="submit-btn" onclick="doRegister()" data-i="reg_submit">Создать аккаунт</button>
    </div>
  </div>
</div>

<!-- Post modal -->
<div class="overlay" id="m-post">
  <div class="modal">
    <button class="modal-x" onclick="closeModal('m-post')">×</button>
    <div class="modal-title" data-i="new_post_title">☁ Новый пост</div>
    <div class="field">
      <label data-i="post_text_label">Текст — максимум 50 слов</label>
      <textarea class="ftextarea" id="p-content" oninput="updateWC()"></textarea>
      <div class="wcount" id="wc">0 / 50</div>
    </div>
    <div class="field">
      <label class="file-label" for="p-img">
        📷 <span data-i="attach_photo">Прикрепить фото</span>
      </label>
      <input type="file" id="p-img" accept="image/*" onchange="previewImg()">
      <img id="p-prev" class="img-prev">
    </div>
    <div class="err" id="p-err"></div>
    <button class="submit-btn" onclick="submitPost()" id="p-btn" data-i="publish_btn">Опубликовать</button>
  </div>
</div>

<!-- Edit profile modal -->
<div class="overlay" id="m-edit">
  <div class="modal">
    <button class="modal-x" onclick="closeModal('m-edit')">×</button>
    <div class="modal-title" data-i="edit_profile_title">Редактировать профиль</div>
    <div class="field">
      <label class="file-label" for="av-inp">
        🌙 <span data-i="upload_avatar">Загрузить аватар</span>
      </label>
      <input type="file" id="av-inp" accept="image/*">
    </div>
    <div class="field">
      <label data-i="about_label">О себе</label>
      <textarea class="ftextarea" id="e-about" style="min-height:72px"></textarea>
    </div>
    <div class="err" id="e-err"></div>
    <button class="submit-btn" onclick="saveProfile()" data-i="save_btn">Сохранить</button>
  </div>
</div>

<!-- Rain & Rainbow -->
<canvas id="rainbow-canvas"></canvas>
<div id="rain-stage"></div>

let lang = 'ru';
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach((b,i) => {
    b.className = 'lang-btn' + ((i===0&&l==='ru')||(i===1&&l==='en') ? ' active' : '');
  });
  applyLang();
  updateNav();
}
function t(k) { return I18N[lang][k] || k; }
function applyLang() {
  document.querySelectorAll('[data-i]').forEach(el => {
    const k = el.getAttribute('data-i');
    el.textContent = t(k);
  });
}

// ===================== STATE =====================
let currentUser = null;

async function init() {
  const res = await fetch('/api/me');
  const data = await res.json();
  currentUser = data.user;
  updateNav();
  loadFeed();
}

function updateNav() {
  const nr = document.getElementById('nav-right');
  if (currentUser) {
    nr.innerHTML = `
      <span class="nav-user" onclick="showProfile('${currentUser.username}')">${currentUser.username}</span>
      <button class="nav-pill dark" onclick="doLogout()">${t('logout')}</button>
    `;
  } else {
    nr.innerHTML = `<button class="nav-pill" onclick="openAuthModal()">${t('login_reg')}</button>`;
  }
}

// ===================== FEED =====================
async function loadFeed() {
  showPage('feed-page');
  const wrap = document.getElementById('posts-wrap');
  wrap.innerHTML = `<div class="state-msg">${t('loading')}</div>`;
  const res = await fetch('/api/posts');
  const posts = await res.json();
  if (!posts.length) {
    wrap.innerHTML = `<div class="state-msg">${t('empty')}<br><small style="opacity:.5;font-size:.8em">${t('empty_sub')}</small></div>`;
    return;
  }
  wrap.innerHTML = '';
  posts.forEach((p, i) => {
    const el = buildPost(p);
    el.style.animationDelay = `${i * 0.055}s`;
    wrap.appendChild(el);
  });
}

// ===================== BUILD CLOUD POST =====================
function buildPost(p, idx=0) {
  const wrap = document.createElement('div');
  wrap.className = 'cloud-post';
  wrap.id = `post-${p.id}`;

  const canDel = currentUser && (currentUser.username === 'siteowner' || currentUser.id === p.user_id);
  const likeC  = p.my_reaction === 'like'    ? ' liked'    : '';
  const disC   = p.my_reaction === 'dislike' ? ' disliked' : '';

  const cloudHtml = `
    <div class="cloud-svg-wrap">
      ${chalkCloudSVG()}
      <div class="cloud-body">
        <div class="cloud-author" onclick="showProfile('${p.username}')">@${p.username}</div>
        <div class="cloud-text">${esc(p.content)}</div>
        <div class="chalk-lines">
          <div class="chalk-line"></div>
          <div class="chalk-line"></div>
          <div class="chalk-line"></div>
        </div>
        <div class="cloud-reactions">
          <button class="rxn-btn${likeC}" onclick="react(${p.id},'like',this)">
            <span class="rxn-icon">🌈</span>
            <span class="rxn-n">${p.likes}</span>
          </button>
          <button class="rxn-btn${disC}" onclick="react(${p.id},'dislike',this)">
            <span class="rxn-icon">🌧</span>
            <span class="rxn-n">${p.dislikes}</span>
          </button>
          <div class="cloud-meta">
            <span class="cloud-time">${fmtTime(p.created_at)}</span>
            ${canDel ? `<button class="del-btn" onclick="delPost(${p.id})">✕</button>` : ''}
          </div>
        </div>
      </div>
    </div>`;

  if (p.image_url) {
    wrap.innerHTML = `
      <div class="post-with-photo">
        ${cloudHtml}
        <div class="photo-cloud">
          <div class="photo-cloud-inner">
            <img src="${p.image_url}" class="photo-img" alt="">
            <div class="photo-badge">Photo</div>
          </div>
        </div>
      </div>`;
  } else {
    wrap.innerHTML = cloudHtml;
  }
  return wrap;
}

function chalkCloudSVG() {
  // Randomize slightly for organic feel
  const r = () => (Math.random() * 4 - 2).toFixed(1);
  return `<svg class="cloud-bg" viewBox="0 0 440 130" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <filter id="chalk" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <g filter="url(#chalk)">
      <ellipse cx="80" cy="80" rx="75" ry="55" fill="#F5F4EF"/>
      <ellipse cx="155" cy="60" rx="60" ry="48" fill="#F5F4EF"/>
      <ellipse cx="230" cy="55" rx="70" ry="52" fill="#F5F4EF"/>
      <ellipse cx="310" cy="62" rx="65" ry="50" fill="#F5F4EF"/>
      <ellipse cx="380" cy="78" rx="68" ry="54" fill="#F5F4EF"/>
      <ellipse cx="110" cy="45" rx="45" ry="38" fill="#F5F4EF"/>
      <ellipse cx="190" cy="38" rx="50" ry="40" fill="#F5F4EF"/>
      <ellipse cx="270" cy="36" rx="48" ry="38" fill="#F5F4EF"/>
      <ellipse cx="350" cy="44" rx="44" ry="36" fill="#F5F4EF"/>
    </g>
  </svg>`;
}

// ===================== REACT =====================
async function react(postId, type, btn) {
  if (!currentUser) { openAuthModal(); return; }
  const postEl = document.getElementById(`post-${postId}`);
  const btns = postEl.querySelectorAll('.rxn-btn');
  const res = await fetch(`/api/posts/${postId}/react`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type })
  });
  const d = await res.json();
  btns[0].querySelector('.rxn-n').textContent = d.likes;
  btns[1].querySelector('.rxn-n').textContent = d.dislikes;
  btns[0].className = 'rxn-btn' + (d.my_reaction === 'like'    ? ' liked'    : '');
  btns[1].className = 'rxn-btn' + (d.my_reaction === 'dislike' ? ' disliked' : '');
  if (type === 'like'    && d.my_reaction === 'like')    triggerRainbow(postEl);
  if (type === 'dislike' && d.my_reaction === 'dislike') triggerRain(postEl);
}

// ===================== RAINBOW =====================
function triggerRainbow(srcEl) {
  const rc = document.getElementById('rainbow-canvas');
  rc.style.display = 'block';
  rc.width  = window.innerWidth;
  rc.height = window.innerHeight;
  const ctx = rc.getContext('2d');
  const rect = srcEl.getBoundingClientRect();
  const ox = rect.left + rect.width  * 0.5;
  const oy = rect.top  + rect.height * 0.5;
  // Target: top-right corner area
  const tx = window.innerWidth  * 0.92;
  const ty = window.innerHeight * 0.05;

  const COLORS = [
    'rgba(255,50,80,',
    'rgba(255,140,0,',
    'rgba(255,220,0,',
    'rgba(80,210,80,',
    'rgba(40,140,255,',
    'rgba(160,80,255,',
  ];
  const W = [14, 12, 11, 10, 9, 8];

  const dur = 1800;
  const t0  = performance.now();

  function frame(now) {
    const prog = Math.min((now - t0) / dur, 1);
    ctx.clearRect(0, 0, rc.width, rc.height);

    // Ease in-out
    const e = prog < 0.5 ? 2*prog*prog : -1+(4-2*prog)*prog;
    // Arc control point (up and to the right)
    const cx1 = ox + (tx - ox) * 0.25;
    const cy1 = oy - 320 * Math.sin(prog * Math.PI);
    const cx2 = ox + (tx - ox) * 0.75;
    const cy2 = ty - 100 * Math.sin(prog * Math.PI);
    // End point moves along path
    const ex = ox + (tx - ox) * e;
    const ey = oy + (ty - oy) * e - 180 * Math.sin(prog * Math.PI * 0.9);

    const alpha = Math.sin(prog * Math.PI) * 0.9;

    COLORS.forEach((col, i) => {
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      ctx.bezierCurveTo(cx1, cy1 - i*6, cx2, cy2 - i*4, ex, ey);
      ctx.strokeStyle = col + alpha + ')';
      ctx.lineWidth   = W[i];
      ctx.lineCap     = 'round';
      ctx.lineJoin    = 'round';
      ctx.stroke();
    });

    if (prog < 1) requestAnimationFrame(frame);
    else { ctx.clearRect(0,0,rc.width,rc.height); rc.style.display = 'none'; }
  }
  requestAnimationFrame(frame);
}

// ===================== RAIN =====================
function triggerRain(srcEl) {
  const stage = document.getElementById('rain-stage');
  const rect  = srcEl.getBoundingClientRect();
  stage.style.cssText = `
    display:block;
    left:${rect.left}px; top:${rect.top}px;
    width:${rect.width}px; height:${rect.height + 180}px;
  `;
  stage.innerHTML = '';

  for (let i = 0; i < 55; i++) {
    const d = document.createElement('div');
    d.className = 'drop';
    const h = 12 + Math.random() * 22;
    d.style.cssText = `
      left:${Math.random()*100}%;
      height:${h}px;
      animation-duration:${0.35 + Math.random()*0.45}s;
      animation-delay:${Math.random()*0.9}s;
      opacity:${0.5 + Math.random()*0.5};
    `;
    stage.appendChild(d);
  }
  setTimeout(() => { stage.style.display = 'none'; stage.innerHTML = ''; }, 2200);
}

// ===================== POST =====================
function openPostModal() {
  if (!currentUser) { openAuthModal(); return; }
  document.getElementById('p-content').value = '';
  document.getElementById('p-img').value = '';
  document.getElementById('p-prev').style.display = 'none';
  document.getElementById('p-err').className = 'err';
  document.getElementById('wc').textContent = '0 / 50';
  openModal('m-post');
}

function updateWC() {
  const txt = document.getElementById('p-content').value.trim();
  const w   = txt ? txt.split(/\s+/).length : 0;
  const el  = document.getElementById('wc');
  el.textContent = `${w} / 50`;
  el.className   = w > 50 ? 'wcount over' : 'wcount';
}

function previewImg() {
  const f = document.getElementById('p-img').files[0];
  const p = document.getElementById('p-prev');
  if (f) {
    const r = new FileReader();
    r.onload = e => { p.src = e.target.result; p.style.display = 'block'; };
    r.readAsDataURL(f);
  } else p.style.display = 'none';
}

async function submitPost() {
  const content = document.getElementById('p-content').value.trim();
  const imgFile = document.getElementById('p-img').files[0];
  const errEl   = document.getElementById('p-err');
  const btn     = document.getElementById('p-btn');
  if (!content) { showErr(errEl, '!'); return; }
  if (content.split(/\s+/).length > 50) { showErr(errEl, '50 ' + (lang==='ru'?'слов макс':'words max')); return; }

  btn.disabled = true;
  btn.textContent = lang === 'ru' ? 'Публикуем...' : 'Publishing...';

  const fd = new FormData();
  fd.append('content', content);
  if (imgFile) fd.append('image', imgFile);

  try {
    const res  = await fetch('/api/posts', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) { showErr(errEl, data.error); btn.disabled = false; btn.textContent = t('publish_btn'); return; }
    closeModal('m-post');
    const wrap = document.getElementById('posts-wrap');
    const old  = wrap.querySelector('.state-msg');
    if (old) old.remove();
    const el = buildPost(data);
    el.style.animationDelay = '0s';
    wrap.insertBefore(el, wrap.firstChild);
  } catch { showErr(errEl, 'Error'); }
  btn.disabled = false;
  btn.textContent = t('publish_btn');
}

async function delPost(id) {
  if (!confirm(t('delete_confirm'))) return;
  const res = await fetch(`/api/posts/${id}`, { method: 'DELETE' });
  if (res.ok) document.getElementById(`post-${id}`)?.remove();
}

// ===================== PROFILE =====================
async function showProfile(username) {
  showPage('profile-page');
  const c = document.getElementById('profile-content');
  c.innerHTML = `<div class="profile-sky"><div class="state-msg" style="color:rgba(255,255,255,0.4)">${t('loading')}</div></div>`;

  const res  = await fetch(`/api/profile/${username}`);
  const data = await res.json();
  if (!res.ok) return;

  const { user, posts } = data;
  const isMe = currentUser && currentUser.id === user.id;

  c.innerHTML = `
    <div class="profile-sky">
      <div class="profile-moon-wrap" ${isMe ? 'title="Change avatar"' : ''}>
        ${user.avatar_url
          ? `<img src="${user.avatar_url}" alt="">`
          : `<div class="moon-placeholder">☽</div>`}
      </div>
      <div class="profile-name">${esc(user.username)}</div>
      <div class="profile-about">${user.about ? esc(user.about) : `<em>${t('no_bio')}</em>`}</div>
      ${isMe ? `<button class="profile-edit-btn" onclick="openEditProfile()">${t('edit_profile')}</button>` : ''}
    </div>
    <div class="profile-posts-section">
      <div class="profile-posts-inner">
        <div class="section-label">${t('posts_label')}</div>
        ${posts.length === 0
          ? `<div style="color:rgba(255,255,255,0.25);font-family:'Unbounded',sans-serif;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em">${t('no_posts')}</div>`
          : posts.map(p => `
            <div class="profile-post-card">
              <div class="profile-post-text">${esc(p.content)}</div>
              ${p.image_url ? `<img src="${p.image_url}" style="max-width:100%;border-radius:14px;margin-top:10px">` : ''}
              <div class="profile-post-meta">${fmtTime(p.created_at)} · 🌈${p.likes} 🌧${p.dislikes}</div>
            </div>`).join('')}
      </div>
    </div>`;
}

function openEditProfile() {
  document.getElementById('e-about').value = currentUser.about || '';
  openModal('m-edit');
}

async function saveProfile() {
  const about   = document.getElementById('e-about').value;
  const avFile  = document.getElementById('av-inp').files[0];
  const errEl   = document.getElementById('e-err');
  const fd = new FormData();
  fd.append('about', about);
  if (avFile) fd.append('avatar', avFile);
  const res  = await fetch('/api/profile', { method: 'PUT', body: fd });
  const data = await res.json();
  if (!res.ok) { showErr(errEl, data.error); return; }
  currentUser = { ...currentUser, ...data };
  closeModal('m-edit');
  showProfile(currentUser.username);
}

// ===================== AUTH =====================
function openAuthModal() { openModal('m-auth'); }

function switchTab(tab) {
  document.getElementById('f-login').style.display = tab==='login' ? 'block' : 'none';
  document.getElementById('f-reg').style.display   = tab==='register' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.className = 'tab' + ((i===0&&tab==='login')||(i===1&&tab==='register') ? ' active' : '');
  });
}

async function doLogin() {
  const username = document.getElementById('l-user').value.trim();
  const password = document.getElementById('l-pass').value;
  const errEl    = document.getElementById('l-err');
  const res  = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username,password}) });
  const data = await res.json();
  if (!res.ok) { showErr(errEl, data.error); return; }
  const me = await (await fetch('/api/me')).json();
  currentUser = me.user;
  closeModal('m-auth');
  updateNav();
  loadFeed();
}

async function doRegister() {
  const username = document.getElementById('r-user').value.trim();
  const password = document.getElementById('r-pass').value;
  const errEl    = document.getElementById('r-err');
  const res  = await fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username,password}) });
  const data = await res.json();
  if (!res.ok) { showErr(errEl, data.error); return; }
  const me = await (await fetch('/api/me')).json();
  currentUser = me.user;
  closeModal('m-auth');
  updateNav();
  loadFeed();
}

async function doLogout() {
  await fetch('/api/logout', { method:'POST' });
  currentUser = null;
  updateNav();
  loadFeed();
}

// ===================== UTILS =====================
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showErr(el, msg) { el.textContent = msg; el.className = 'err show'; }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtTime(ds) {
  const d    = new Date(ds);
  const diff = (Date.now() - d) / 1000;
  if (diff < 60)   return t('just_now');
  if (diff < 3600) return Math.floor(diff/60)   + t('min_ago');
  if (diff < 86400)return Math.floor(diff/3600) + t('hr_ago');
  return d.toLocaleDateString(lang==='ru'?'ru-RU':'en-US', {day:'numeric', month:'short'});
}

// Close on overlay click
document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

document.getElementById('l-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('r-pass').addEventListener('keydown', e => { if(e.key==='Enter') doRegister(); });

init();
</script>
